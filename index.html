  <title>Deflation Roadmap</title>
  <style>/* cockpit_kit — design tokens.
 *
 * The ONLY place colors, spacing, typography, shadows live. Card templates
 * and components.css reference these via var(--cockpit-…). If you find yourself
 * writing a hex value or a px in any other file, route it through here.
 *
 * Philosophy: smaller than dashboard_kit's tokens.css. Single light palette
 * + automatic dark via prefers-color-scheme. No per-claw overrides — every
 * customer renders the same chrome, only the cards differ.
 */

:root {
  /* ─── Surfaces ───────────────────────────────────────────────── */
  --cockpit-bg-app:        #F4F5F8;
  --cockpit-bg-subtle:     #ECEEF3;
  --cockpit-surface:       #FFFFFF;
  --cockpit-surface-muted: #F8F9FB;

  /* ─── Ink (text + neutral accents) ───────────────────────────── */
  --cockpit-ink-strong:    #0F1115;
  --cockpit-ink-default:   #1F2433;
  --cockpit-ink-muted:     #5B6478;
  --cockpit-ink-faint:     #8A93A6;
  --cockpit-ink-inverse:   #FFFFFF;

  /* ─── Borders ────────────────────────────────────────────────── */
  --cockpit-border-subtle: rgba(15, 17, 21, 0.06);
  --cockpit-border-default: rgba(15, 17, 21, 0.10);

  /* ─── Semantic palette ──────────────────────────────────────────
     Use the *-subtle for backgrounds, *-strong for text/icons inside
     a colored chip. Cards never reference raw colors. */
  --cockpit-accent:        #2563EB;   /* primary actions, focus */
  --cockpit-accent-subtle: rgba(37, 99, 235, 0.10);
  --cockpit-accent-strong: #1D4ED8;

  --cockpit-warn:          #D97706;   /* "wartet >7d", warnings */
  --cockpit-warn-subtle:   rgba(217, 119, 6, 0.12);
  --cockpit-warn-strong:   #B45309;

  --cockpit-danger:        #DC2626;   /* overdue, errors */
  --cockpit-danger-subtle: rgba(220, 38, 38, 0.10);
  --cockpit-danger-strong: #B91C1C;

  --cockpit-ok:            #059669;   /* paid, completed */
  --cockpit-ok-subtle:     rgba(5, 150, 105, 0.10);
  --cockpit-ok-strong:     #047857;

  /* ─── Spacing (4px scale) ────────────────────────────────────── */
  --cockpit-space-1: 0.25rem;
  --cockpit-space-2: 0.5rem;
  --cockpit-space-3: 0.75rem;
  --cockpit-space-4: 1rem;
  --cockpit-space-5: 1.25rem;
  --cockpit-space-6: 1.5rem;
  --cockpit-space-8: 2rem;

  /* ─── Radius ─────────────────────────────────────────────────── */
  --cockpit-radius-sm:   0.375rem;
  --cockpit-radius-md:   0.625rem;
  --cockpit-radius-lg:   0.875rem;
  --cockpit-radius-xl:   1rem;
  --cockpit-radius-pill: 9999px;

  /* ─── Shadows ────────────────────────────────────────────────── */
  --cockpit-shadow-card:
    0 1px 2px 0 rgba(15, 17, 21, 0.04),
    0 0 0 1px rgba(15, 17, 21, 0.04);
  --cockpit-shadow-elevated:
    0 4px 12px -2px rgba(15, 17, 21, 0.08),
    0 0 0 1px rgba(15, 17, 21, 0.04);

  /* ─── Typography ─────────────────────────────────────────────── */
  --cockpit-font-sans:    "Inter", system-ui, -apple-system, sans-serif;
  --cockpit-font-mono:    "JetBrains Mono", ui-monospace, monospace;

  --cockpit-text-xs:      0.6875rem;   /*  11px */
  --cockpit-text-sm:      0.8125rem;   /*  13px */
  --cockpit-text-base:    0.875rem;    /*  14px */
  --cockpit-text-md:      0.9375rem;   /*  15px */
  --cockpit-text-lg:      1.0625rem;   /*  17px */
  --cockpit-text-xl:      1.25rem;     /*  20px */
  --cockpit-text-2xl:     1.5rem;      /*  24px */

  --cockpit-leading-tight:  1.25;
  --cockpit-leading-normal: 1.5;

  --cockpit-weight-normal:    400;
  --cockpit-weight-medium:    500;
  --cockpit-weight-semibold:  600;
  --cockpit-weight-bold:      700;

  /* ─── Layout ─────────────────────────────────────────────────── */
  --cockpit-content-max: 64rem;          /* 1024px */
  --cockpit-bottom-nav-h: 3.75rem;       /* 60px */
}


/* ─── Dark mode (auto via OS, can be forced via [data-theme="dark"]) ── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --cockpit-bg-app:        #0B0D12;
    --cockpit-bg-subtle:     #11141B;
    --cockpit-surface:       #1A1E27;
    --cockpit-surface-muted: #14181F;

    --cockpit-ink-strong:    #F4F5F8;
    --cockpit-ink-default:   #E5E7EE;
    --cockpit-ink-muted:     #A1A8B8;
    --cockpit-ink-faint:     #6E7689;
    --cockpit-ink-inverse:   #0F1115;

    --cockpit-border-subtle: rgba(255, 255, 255, 0.05);
    --cockpit-border-default: rgba(255, 255, 255, 0.10);

    --cockpit-accent:        #60A5FA;
    --cockpit-accent-subtle: rgba(96, 165, 250, 0.16);
    --cockpit-accent-strong: #3B82F6;

    --cockpit-warn:          #F59E0B;
    --cockpit-warn-subtle:   rgba(245, 158, 11, 0.18);
    --cockpit-warn-strong:   #FBBF24;

    --cockpit-danger:        #F87171;
    --cockpit-danger-subtle: rgba(248, 113, 113, 0.16);
    --cockpit-danger-strong: #FCA5A5;

    --cockpit-ok:            #34D399;
    --cockpit-ok-subtle:     rgba(52, 211, 153, 0.14);
    --cockpit-ok-strong:     #6EE7B7;

    --cockpit-shadow-card:
      0 1px 2px 0 rgba(0, 0, 0, 0.30),
      0 0 0 1px rgba(255, 255, 255, 0.06);
    --cockpit-shadow-elevated:
      0 4px 12px -2px rgba(0, 0, 0, 0.40),
      0 0 0 1px rgba(255, 255, 255, 0.06);
  }
}

[data-theme="dark"] {
  --cockpit-bg-app:        #0B0D12;
  --cockpit-bg-subtle:     #11141B;
  --cockpit-surface:       #1A1E27;
  --cockpit-surface-muted: #14181F;
  --cockpit-ink-strong:    #F4F5F8;
  --cockpit-ink-default:   #E5E7EE;
  --cockpit-ink-muted:     #A1A8B8;
  --cockpit-ink-faint:     #6E7689;
  --cockpit-border-subtle: rgba(255, 255, 255, 0.05);
  --cockpit-border-default: rgba(255, 255, 255, 0.10);
  --cockpit-accent:        #60A5FA;
  --cockpit-accent-subtle: rgba(96, 165, 250, 0.16);
  --cockpit-accent-strong: #3B82F6;
  --cockpit-warn:          #F59E0B;
  --cockpit-warn-subtle:   rgba(245, 158, 11, 0.18);
  --cockpit-warn-strong:   #FBBF24;
  --cockpit-danger:        #F87171;
  --cockpit-danger-subtle: rgba(248, 113, 113, 0.16);
  --cockpit-danger-strong: #FCA5A5;
  --cockpit-ok:            #34D399;
  --cockpit-ok-subtle:     rgba(52, 211, 153, 0.14);
  --cockpit-ok-strong:     #6EE7B7;
  --cockpit-shadow-card:
    0 1px 2px 0 rgba(0, 0, 0, 0.30),
    0 0 0 1px rgba(255, 255, 255, 0.06);
  --cockpit-shadow-elevated:
    0 4px 12px -2px rgba(0, 0, 0, 0.40),
    0 0 0 1px rgba(255, 255, 255, 0.06);
}
</style>
  <style>
    /* base reset */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: var(--cockpit-font-sans, system-ui, -apple-system, "Segoe UI", sans-serif);
      font-size: var(--cockpit-text-base, 0.95rem);
      color: var(--cockpit-ink-default, #1F2433);
      background: var(--cockpit-bg-app, #F4F5F8);
      line-height: var(--cockpit-leading-normal, 1.5);
      -webkit-font-smoothing: antialiased;
    }
    [x-cloak], [hidden] { display: none !important; }
    /* unlock screen */
    .cockpit-lock {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: var(--cockpit-bg-app, #F4F5F8);
      z-index: 9999;
    }
    .cockpit-lock__box {
      background: var(--cockpit-surface, #fff);
      border: 1px solid var(--cockpit-border-default, rgba(0,0,0,0.10));
      border-radius: var(--cockpit-radius-lg, 0.75rem);
      padding: var(--cockpit-space-6, 1.5rem);
      box-shadow: 0 10px 32px rgba(15,17,21,0.10);
      width: min(380px, 92vw);
    }
    .cockpit-lock__title {
      font-size: var(--cockpit-text-lg, 1.05rem);
      font-weight: 600;
      margin: 0 0 var(--cockpit-space-4, 1rem);
    }
    .cockpit-lock input {
      width: 100%;
      padding: var(--cockpit-space-3, 0.75rem);
      border-radius: var(--cockpit-radius-sm, 0.375rem);
      border: 1px solid var(--cockpit-border-default, rgba(0,0,0,0.10));
      font-size: var(--cockpit-text-base, 0.95rem);
      background: var(--cockpit-surface-muted, #F8F9FB);
      color: var(--cockpit-ink-strong, #0F1115);
    }
    .cockpit-lock button {
      width: 100%;
      margin-top: var(--cockpit-space-3, 0.75rem);
      padding: var(--cockpit-space-3, 0.75rem);
      border: none;
      border-radius: var(--cockpit-radius-sm, 0.375rem);
      background: var(--cockpit-accent, #2563EB);
      color: #fff;
      font-size: var(--cockpit-text-base, 0.95rem);
      font-weight: 500;
      cursor: pointer;
    }
    .cockpit-lock__err {
      margin-top: var(--cockpit-space-2, 0.5rem);
      color: var(--cockpit-danger-strong, #B91C1C);
      font-size: var(--cockpit-text-sm, 0.85rem);
      min-height: 1.2em;
    }
  </style>
  <style>/* Roadmap renderer — payload-driven UI styles. */

.app-shell {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 4rem;
}

/* Hero ----------------------------------------------------------- */
.hero-card {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-lg, 0.75rem);
  padding: 1.5rem 1.75rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 1px 2px rgba(15,17,21,0.04);
}
.hero-card h1 {
  margin: 0 0 0.4rem;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--cockpit-ink-strong, #0F1115);
}
.hero-card .sub {
  color: var(--cockpit-ink-muted, #5B6478);
  font-size: 0.9rem;
}

/* Metric grid ---------------------------------------------------- */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.metric {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-md, 0.625rem);
  padding: 1rem 1.1rem;
}
.metric .label {
  color: var(--cockpit-ink-muted, #5B6478);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.3rem;
}
.metric .value {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--cockpit-ink-strong, #0F1115);
}

/* Section heading ------------------------------------------------- */
.section {
  margin-bottom: 2rem;
}
.section h2 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--cockpit-ink-strong, #0F1115);
  margin: 0 0 0.75rem;
  letter-spacing: 0.01em;
}

/* Active list ---------------------------------------------------- */
.active-list {
  display: grid;
  gap: 0.6rem;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}
.active-card {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-left: 3px solid #3b82f6;
  border-radius: var(--cockpit-radius-md, 0.625rem);
  padding: 0.7rem 0.9rem;
  cursor: pointer;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
}
.active-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,17,21,0.06); }
.active-card .id { font-family: ui-monospace, "SFMono-Regular", monospace; color: var(--cockpit-ink-muted, #5B6478); font-size: 0.75rem; }
.active-card .title { font-weight: 500; margin-top: 0.2rem; }
.active-card .meta { color: var(--cockpit-ink-muted, #5B6478); font-size: 0.78rem; margin-top: 0.35rem; }

/* Filter chips --------------------------------------------------- */
.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.75rem;
}
.chip {
  display: inline-flex; align-items: center;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  background: var(--cockpit-surface-muted, #F8F9FB);
  border: 1px solid var(--cockpit-border-default, rgba(0,0,0,0.10));
  color: var(--cockpit-ink-default, #1F2433);
  cursor: pointer;
  font-size: 0.8rem;
  user-select: none;
}
.chip.active {
  background: var(--cockpit-accent, #2563EB);
  color: #fff;
  border-color: transparent;
}

/* Kanban --------------------------------------------------------- */
.kanban {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 0.6rem;
}
@media (max-width: 1000px) {
  .kanban { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
.kanban-col {
  background: var(--cockpit-surface-muted, #F8F9FB);
  border-radius: var(--cockpit-radius-md, 0.625rem);
  padding: 0.6rem;
  min-height: 120px;
}
.kanban-col-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--cockpit-ink-muted, #5B6478);
  margin-bottom: 0.5rem;
}
.kanban-col-head .count {
  background: var(--cockpit-surface, #fff);
  color: var(--cockpit-ink-default, #1F2433);
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  font-size: 0.7rem;
}
.kanban-cards { display: flex; flex-direction: column; gap: 0.4rem; }
.kanban-card {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-sm, 0.375rem);
  padding: 0.55rem 0.65rem;
  cursor: pointer;
  display: flex; flex-direction: column;
  transition: transform 0.06s ease, box-shadow 0.06s ease;
}
.kanban-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,17,21,0.06); }
.kanban-card.hidden { display: none; }
.kanban-card[data-archived="true"] { opacity: 0.6; border-style: dashed; display: none; }
.kanban-card[data-archived="true"].show-archived { display: flex; }
.kanban-card-top { display: flex; justify-content: space-between; font-size: 0.7rem; }
.kanban-card-id { font-family: ui-monospace, "SFMono-Regular", monospace; color: var(--cockpit-ink-muted, #5B6478); }
.kanban-card-kind { color: var(--cockpit-ink-faint, #8A93A6); }
.kanban-card-title { font-weight: 500; margin-top: 0.2rem; }
.kanban-card-breadcrumb { color: var(--cockpit-ink-faint, #8A93A6); font-size: 0.72rem; margin-top: 0.15rem; }
.kanban-card-bottom { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.35rem; font-size: 0.7rem; color: var(--cockpit-ink-muted, #5B6478); }

/* Epic tree ------------------------------------------------------- */
.epic-tree { display: flex; flex-direction: column; gap: 0.5rem; }
.epic {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-md, 0.625rem);
  overflow: hidden;
}
.epic > summary {
  list-style: none;
  cursor: pointer;
  padding: 0.7rem 0.9rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.epic > summary::-webkit-details-marker { display: none; }
.epic > summary::before {
  content: "▸";
  display: inline-block;
  width: 1em;
  color: var(--cockpit-ink-faint, #8A93A6);
  transition: transform 0.1s ease;
}
.epic[open] > summary::before { transform: rotate(90deg); }
.epic-title { font-weight: 600; flex: 1; }
.epic-progress {
  flex: 0 0 120px;
  height: 6px; background: var(--cockpit-surface-muted, #F8F9FB);
  border-radius: 999px; overflow: hidden;
}
.epic-progress > div { height: 100%; background: #22c55e; }
.epic-progress-label { font-size: 0.72rem; color: var(--cockpit-ink-muted, #5B6478); min-width: 3em; text-align: right; }
.epic-children { padding: 0 0.9rem 0.6rem 1.7rem; display: flex; flex-direction: column; gap: 0.25rem; }
.tree-row {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.35rem 0.5rem;
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: var(--cockpit-radius-sm, 0.375rem);
}
.tree-row:hover { background: var(--cockpit-surface-muted, #F8F9FB); }
.tree-row .id { font-family: ui-monospace, "SFMono-Regular", monospace; color: var(--cockpit-ink-muted, #5B6478); font-size: 0.78rem; }
.tree-row .title { flex: 1; }
.tree-row .status-pill { font-size: 0.7rem; padding: 0.05rem 0.4rem; border-radius: 999px; color: #fff; }

/* Status pill colors */
.status-pill[data-status="open"] { background: #94a3b8; color: #0f172a; }
.status-pill[data-status="in-progress"] { background: #3b82f6; }
.status-pill[data-status="blocked"] { background: #f59e0b; color: #0f172a; }
.status-pill[data-status="done"] { background: #22c55e; color: #0f172a; }
.status-pill[data-status="dropped"] { background: #6b7280; }

/* Mermaid blocks ------------------------------------------------- */
.diagram-card {
  background: var(--cockpit-surface, #fff);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-md, 0.625rem);
  padding: 0.6rem 0.9rem;
  margin-bottom: 1rem;
}
.diagram-card summary {
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--cockpit-ink-strong, #0F1115);
}
.diagram-mount {
  overflow-x: auto;
  margin-top: 0.6rem;
  text-align: center;
}
.diagram-mount svg { max-width: 100%; height: auto; }

/* Archive section ------------------------------------------------- */
.archive-section {
  background: var(--cockpit-surface-muted, #F8F9FB);
  border: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
  border-radius: var(--cockpit-radius-md, 0.625rem);
  padding: 0.7rem 0.95rem;
}
.archive-section summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; }
.archive-list { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.6rem; }
.archive-row {
  display: flex; align-items: center; gap: 0.6rem;
  font-size: 0.8rem;
  padding: 0.3rem 0.45rem;
  border-radius: var(--cockpit-radius-sm, 0.375rem);
  cursor: pointer;
}
.archive-row:hover { background: var(--cockpit-surface, #fff); }
.archive-row .id { font-family: ui-monospace, "SFMono-Regular", monospace; color: var(--cockpit-ink-muted, #5B6478); font-size: 0.78rem; }
.archive-row .title { flex: 1; }
.archive-row .when { color: var(--cockpit-ink-faint, #8A93A6); font-size: 0.75rem; }

/* Footer --------------------------------------------------------- */
.footer {
  margin-top: 2rem;
  color: var(--cockpit-ink-muted, #5B6478);
  font-size: 0.8rem;
  text-align: center;
}
.footer a { color: var(--cockpit-accent, #2563EB); }

/* Modals --------------------------------------------------------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 17, 21, 0.4);
  display: grid; place-items: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}
.modal {
  background: var(--cockpit-surface, #fff);
  border-radius: var(--cockpit-radius-lg, 0.75rem);
  box-shadow: 0 20px 60px rgba(15,17,21,0.25);
  width: min(720px, 100%);
  max-height: 88vh;
  display: flex; flex-direction: column;
}
.modal-head {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--cockpit-border-subtle, rgba(0,0,0,0.06));
}
.modal-head .id { font-family: ui-monospace, "SFMono-Regular", monospace; color: var(--cockpit-ink-muted, #5B6478); font-size: 0.85rem; }
.modal-head .title { font-weight: 600; flex: 1; }
.modal-head button {
  background: transparent; border: none;
  font-size: 1.3rem; cursor: pointer;
  color: var(--cockpit-ink-muted, #5B6478);
}
.modal-body {
  padding: 1rem 1.2rem;
  overflow-y: auto;
  flex: 1 1 auto;
}
.modal-body h1, .modal-body h2, .modal-body h3 { margin-top: 1.2rem; }
.modal-body pre {
  background: var(--cockpit-surface-muted, #F8F9FB);
  padding: 0.8rem;
  border-radius: var(--cockpit-radius-sm, 0.375rem);
  overflow-x: auto;
  font-size: 0.82rem;
}
.modal-body code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: 0.85em; }
.modal-doc-buttons { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.6rem 0; }
.doc-btn {
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
  background: var(--cockpit-accent, #2563EB);
  color: #fff;
  border: none;

  <!-- crypto_client: prompts for passphrase, decrypts, dispatches cockpit:ready -->
  <script>/* cockpit_core — payload unlock + ready dispatch.
 *
 * Two payload shapes inlined into <script id="cockpit-payload">:
 *
 *   1. Plaintext: text starts with `plaintext.` followed by base64(JSON).
 *      No lock screen; dispatches `cockpit:ready` on DOMContentLoaded.
 *
 *   2. Encrypted: a JSON object `{schema_version, locked:true, crypto:{...}, ...}`
 *      with each leaf as `{"$e": "kc1.<base64>"}`. AES-256-GCM + PBKDF2-SHA256.
 *      Same wire format as dashboard_kit; we keep it so existing tooling keeps
 *      decrypting both kinds.
 *
 * On successful unlock the plaintext is stashed at `cockpitCrypto._lastPlain`
 * and `cockpit.payload()` reads from there. `cockpit:ready` then fires once.
 *
 * The agent's app.js should listen:
 *
 *   document.addEventListener("cockpit:ready", function () {
 *     const data = window.cockpit.payload();
 *     // start Alpine, render views, etc.
 *   });
 */
(function (W) {
  "use strict";

  function _b64ToBytes(s) {
    var t = s.replace(/-/g, "+").replace(/_/g, "/");
    var pad = t.length % 4;
    if (pad) t += "=".repeat(4 - pad);
    var bin = atob(t);
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function _deriveKey(passphrase, saltBytes, iterations) {
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey(
      "raw", enc.encode(passphrase), "PBKDF2", false,
      ["deriveBits", "deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: saltBytes, iterations: iterations, hash: "SHA-256" },
      keyMat,
      { name: "AES-GCM", length: 256 },
      false, ["decrypt"]
    );
  }

  async function _decryptToken(key, token) {
    if (typeof token !== "string" || token.indexOf("kc1.") !== 0) {
      throw new Error("bad cipher token");
    }
    var raw = _b64ToBytes(token.slice(4));
    var iv = raw.slice(0, 12);
    var ct = raw.slice(12);
    var buf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    var txt = new TextDecoder().decode(buf);
    if (txt === "null") return null;
    if (txt === "true") return true;
    if (txt === "false") return false;
    if (txt.length && (txt[0] === '"' || txt[0] === "[" || txt[0] === "{")) {
      try { return JSON.parse(txt); } catch (e) { /* fall through */ }
    }
    var n = Number(txt);
    if (txt !== "" && !Number.isNaN(n) && String(n) === txt) return n;
    try { return JSON.parse(txt); } catch (e) { return txt; }
  }

  async function _decryptLeaves(obj, key) {
    if (obj !== null && typeof obj === "object" && !Array.isArray(obj)) {
      var keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "$e") return _decryptToken(key, obj.$e);
      var out = {};
      for (var k in obj) {
        if (!Object.prototype.hasOwnProperty.call(obj, k)) continue;
        if (k === "crypto" || k === "locked") { out[k] = obj[k]; continue; }
        out[k] = await _decryptLeaves(obj[k], key);
      }
      return out;
    }
    if (Array.isArray(obj)) {
      var arr = [];
      for (var i = 0; i < obj.length; i++) arr.push(await _decryptLeaves(obj[i], key));
      return arr;
    }
    return obj;
  }

  async function _unlock(doc, passphrase) {
    if (!doc || !doc.locked || !doc.crypto) return doc;
    var c = doc.crypto;
    var key = await _deriveKey(passphrase, _b64ToBytes(c.salt), c.iter || 310000);
    var merged = { schema_version: doc.schema_version };
    for (var k in doc) {
      if (!Object.prototype.hasOwnProperty.call(doc, k)) continue;
      if (k === "schema_version" || k === "locked" || k === "crypto") continue;
      merged[k] = await _decryptLeaves(doc[k], key);
    }
    return merged;
  }

  var Crypto = {
    _lastPlain: null,
    _ready: false,
    unlock: function (event) {
      if (event && event.preventDefault) event.preventDefault();
      var pp = (document.getElementById("cockpit-pp") || {}).value || "";
      var errEl = document.getElementById("cockpit-lock-err");
      if (errEl) errEl.textContent = "";
      var raw = (document.getElementById("cockpit-payload") || {}).textContent || "";
      var doc;
      try { doc = JSON.parse(raw); } catch (e) {
        if (errEl) errEl.textContent = "Payload not parseable.";
        return false;
      }
      _unlock(doc, pp).then(function (plain) {
        Crypto._lastPlain = plain;
        // Bust runtime.js's payload cache so the next cockpit.payload()
        // call reads the now-decrypted plaintext instead of a stale shell.
        if (W.cockpit && typeof W.cockpit.invalidate === "function") {
          W.cockpit.invalidate();
        }
        var lock = document.getElementById("cockpit-lock");
        var app  = document.getElementById("cockpit-app");
        if (lock) lock.style.display = "none";
        if (app)  app.removeAttribute("x-cloak");
        Crypto._ready = true;
        document.dispatchEvent(new CustomEvent("cockpit:ready"));
      }).catch(function (err) {
        console.warn("cockpit unlock failed", err);
        if (errEl) errEl.textContent = "Wrong passphrase.";
      });
      return false;
    },
  };

  W.cockpitCrypto = Crypto;

  document.addEventListener("DOMContentLoaded", function () {
    var raw = (document.getElementById("cockpit-payload") || {}).textContent || "";
    raw = raw.trim();
    var lock = document.getElementById("cockpit-lock");
    var app  = document.getElementById("cockpit-app");

    // Plaintext path: no lock, ready immediately.
    if (raw.indexOf("plaintext.") === 0) {
      if (lock) lock.style.display = "none";
      if (app)  app.removeAttribute("x-cloak");
      Crypto._ready = true;
      document.dispatchEvent(new CustomEvent("cockpit:ready"));
      return;
    }

    // Encrypted path: show lock.
    if (lock) lock.style.display = "grid";
    if (app)  app.setAttribute("x-cloak", "");
  });
})(window);
</script>

  <!-- cockpit runtime helpers (cockpit.payload(), fmt, …) -->
  <script>/* cockpit_core — runtime helpers for agent-authored cockpits.
 *
 * Surface (every helper hangs off `window.cockpit`):
 *
 *   cockpit.router(views, defaultView)
 *       Hash-based view router for Alpine. Returns a reactive object
 *       `{ view, params, go(name, params) }` that you spread into a
 *       single `x-data` root. Views are switched via `x-show="view==='X'"`
 *       blocks; `params` carries query-string-style state (e.g. detail-page
 *       row id). Listens to hashchange — back/forward work natively.
 *
 *   cockpit.payload()
 *       Returns the parsed JSON payload that render.py inlined into the
 *       page (decrypted if a passphrase was set). Cached after first call.
 *       The bot's app.js calls this once at startup to seed Alpine state.
 *
 *   cockpit.chart(canvas, config)
 *       Single source of truth for Chart.js lifecycle. Waits for Chart.js
 *       to be defined (CDN may load late), destroys any prior chart on the
 *       same canvas, returns { update(newConfig), destroy() }. Use this
 *       instead of `new Chart(...)` directly so a regen doesn't leak
 *       chart instances.
 *
 *   cockpit.fmt
 *       Small formatters: money(amount, ccy), date(iso), datetime(iso),
 *       relative(iso) — '3 days ago'.
 *
 * Deliberately omitted: any DOM-component helpers (tables, cards, kpi
 * tiles). Those are the bot's responsibility to author. The kit gives
 * tokens for visual consistency and primitives for state/lifecycle —
 * not a component library.
 */
(function () {
  "use strict";

  var W = window;
  W.cockpit = W.cockpit || {};

  /* ─── Payload ──────────────────────────────────────────────────── */

  var _payloadCache = null;
  W.cockpit.payload = function () {
    if (_payloadCache !== null) return _payloadCache;
    var el = document.getElementById("cockpit-payload");
    if (!el) { _payloadCache = {}; return _payloadCache; }
    var raw = (el.textContent || "").trim();
    try {
      if (raw.indexOf("plaintext.") === 0) {
        var b64 = raw.slice("plaintext.".length);
        var json = atob(b64);
        try {
          json = decodeURIComponent(escape(json));
        } catch (e) { /* legacy ascii payloads */ }
        _payloadCache = JSON.parse(json);
      } else if (raw.indexOf("{") === 0 && W.cockpitCrypto && W.cockpitCrypto._lastPlain) {
        _payloadCache = W.cockpitCrypto._lastPlain;
      } else if (raw.indexOf("{") === 0) {
        // Encrypted payload, not yet unlocked. Don't cache an empty
        // shell — that would freeze the UI in '[object Object]' state
        // forever even after unlock. Return empty THIS call but leave
        // the cache uninitialized so the next call (after unlock +
        // cockpit.invalidate()) reads the real plaintext.
        return { schema_version: "v1", data: {}, meta: {} };
      } else {
        _payloadCache = {};
      }
    } catch (e) {
      console.error("cockpit.payload: parse failed", e);
      _payloadCache = {};
    }
    return _payloadCache;
  };

  /* Invalidate the cached payload — call after unlock or any other event
   * that changes what cockpit.payload() should return. crypto_client.js
   * calls this automatically before dispatching `cockpit:ready`. */
  W.cockpit.invalidate = function () { _payloadCache = null; };

  /* ─── Router ───────────────────────────────────────────────────── */

  function _parseHash() {
    var h = (location.hash || "").replace(/^#\/?/, "");
    if (!h) return { name: "", params: {} };
    var parts = h.split("?");
    var name = parts[0];
    var params = {};
    if (parts[1]) {
      parts[1].split("&").forEach(function (kv) {
        var p = kv.split("=");
        if (p[0]) params[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || "");
      });
    }
    return { name: name, params: params };
  }

  W.cockpit.router = function (views, defaultView) {
    var initial = _parseHash();
    var validNames = (views || []).slice();
    var startView = (initial.name && validNames.indexOf(initial.name) !== -1)
      ? initial.name
      : (defaultView || validNames[0] || "");
    var state = {
      view: startView,
      params: initial.params,
      go: function (name, params) {
        var qs = "";
        if (params && Object.keys(params).length) {
          qs = "?" + Object.keys(params).map(function (k) {
            return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
          }).join("&");
        }
        location.hash = "#/" + name + qs;
      },
    };
    W.addEventListener("hashchange", function () {
      var n = _parseHash();
      if (validNames.indexOf(n.name) !== -1) {
        state.view = n.name;
        state.params = n.params;
      }
    });
    return state;
  };

  /* ─── Charts ───────────────────────────────────────────────────── */

  var _chartRegistry = new WeakMap();

  function _whenChartReady(cb, attemptsLeft) {
    if (typeof Chart !== "undefined") return cb();
    if (attemptsLeft <= 0) {
      console.warn("cockpit.chart: Chart.js never defined");
      return;
    }
    setTimeout(function () { _whenChartReady(cb, attemptsLeft - 1); }, 50);
  }

  W.cockpit.chart = function (canvas, config) {
    if (!canvas) return { update: function () {}, destroy: function () {} };
    var existing = _chartRegistry.get(canvas);
    if (existing) {
      try { existing.destroy(); } catch (e) { /* ignore */ }
      _chartRegistry.delete(canvas);
    }
    var handle = { _instance: null, update: function () {}, destroy: function () {} };
    _whenChartReady(function () {
      try {
        handle._instance = new Chart(canvas.getContext("2d"), config);
        _chartRegistry.set(canvas, handle._instance);
        handle.update = function (newConfig) {
          if (!handle._instance) return;
          handle._instance.data = newConfig.data || handle._instance.data;
          handle._instance.options = newConfig.options || handle._instance.options;
          handle._instance.update();
        };
        handle.destroy = function () {
          if (!handle._instance) return;
          try { handle._instance.destroy(); } catch (e) { /* ignore */ }
          _chartRegistry.delete(canvas);
          handle._instance = null;
        };
      } catch (e) {
        console.error("cockpit.chart: init failed", e);
      }
    }, 60);
    return handle;
  };

  /* ─── Formatters ───────────────────────────────────────────────── */

  W.cockpit.fmt = {
    money: function (amount, ccy) {
      if (amount == null || amount === "") return "";
      try {
        return new Intl.NumberFormat(navigator.language || "de-DE", {
          style: "currency",
          currency: ccy || "EUR",
          maximumFractionDigits: 0,
        }).format(Number(amount));
      } catch (e) { return amount + " " + (ccy || "EUR"); }
    },
    date: function (iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleDateString(navigator.language || "de-DE"); }
      catch (e) { return iso; }
    },
    datetime: function (iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString(navigator.language || "de-DE"); }
      catch (e) { return iso; }
    },
    relative: function (iso) {
      if (!iso) return "";
      var diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (isNaN(diff)) return iso;
      var abs = Math.abs(diff);
      var rtf = Intl.RelativeTimeFormat ? new Intl.RelativeTimeFormat(navigator.language || "de-DE", { numeric: "auto" }) : null;
      var pick = function (val, unit) {
        return rtf ? rtf.format(Math.round(diff < 0 ? val : -val), unit) : (Math.round(val) + " " + unit + (diff < 0 ? " away" : " ago"));
      };
      if (abs < 60) return pick(abs, "second");
      if (abs < 3600) return pick(abs / 60, "minute");
      if (abs < 86400) return pick(abs / 3600, "hour");
      if (abs < 86400 * 30) return pick(abs / 86400, "day");
      if (abs < 86400 * 365) return pick(abs / (86400 * 30), "month");
      return pick(abs / (86400 * 365), "year");
    },
  };
})();
</script>

  <!-- Mermaid (defer — app.js waits for it on render) -->
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- marked (markdown) -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- app.js: builds the UI from the decrypted payload -->
  <script>/* Roadmap renderer — client-side hydration.
 *
 * Listens for `cockpit:ready` (fired by crypto_client after decrypt),
 * reads `window.cockpit.payload()`, and builds the entire UI: hero,
 * metrics, active list, kanban, epic tree, Mermaid diagrams, archive,
 * modals (ticket detail + doc viewer).
 */
(function () {
  "use strict";

  var STATUSES = ["open", "in-progress", "blocked", "done", "dropped"];
  var STATUS_LABEL = {
    "open": "Open", "in-progress": "In Progress",
    "blocked": "Blocked", "done": "Done", "dropped": "Dropped",
  };

  var P = null;                      // payload
  var TICKETS_BY_ID = {};            // id -> ticket
  var ACTIVE_FACETS = {              // filter chips state
    status: null,                    // single status filter (null = all)
    epic: null,                      // single top-epic filter (null = all)
    kind: null,                      // single kind filter (null = all)
    showArchived: false,
  };
  var MODAL_STACK = [];              // stack of open modals (z-index +10 each)

  // ── helpers ────────────────────────────────────────────────────────

  function el(tag, attrs, children) {
    var n = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (!Object.prototype.hasOwnProperty.call(attrs, k)) continue;
        if (k === "class") n.className = attrs[k];
        else if (k === "html") n.innerHTML = attrs[k];
        else if (k === "text") n.textContent = attrs[k];
        else if (k.indexOf("on") === 0 && typeof attrs[k] === "function") {
          n.addEventListener(k.slice(2), attrs[k]);
        } else if (k === "data") {
          for (var dk in attrs.data) n.dataset[dk] = attrs.data[dk];
        } else {
          n.setAttribute(k, attrs[k]);
        }
      }
    }
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function (c) {
        if (c == null || c === false) return;
        if (typeof c === "string") n.appendChild(document.createTextNode(c));
        else n.appendChild(c);
      });
    }
    return n;
  }

  function renderMarkdown(text) {
    if (!text) return "";
    if (window.marked && typeof window.marked.parse === "function") {
      try { return window.marked.parse(text); }
      catch (e) { /* fall through */ }
    }
    // Minimal fallback: escape + preserve newlines
    var esc = String(text)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return "<pre>" + esc + "</pre>";
  }

  function fmtDate(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleDateString(); } catch (e) { return iso; }
  }

  // ── Sections ───────────────────────────────────────────────────────

  function renderHero() {
    return el("header", { class: "hero-card" }, [
      el("h1", { text: "Deflation Roadmap" }),
      el("div", { class: "sub", text:
        "Generated " + (P.generated_at || "") + " · " +
        P.counts.total + " active tickets (" + P.counts.archived_count + " archived)" }),
    ]);
  }

  function renderMetrics() {
    var c = P.counts;
    var grid = el("div", { class: "metric-grid" });
    [
      ["Total", c.total],
      ["Open", c.open || 0],
      ["In Progress", c["in-progress"] || 0],
      ["Done", c.done || 0],
    ].forEach(function (pair) {
      grid.appendChild(el("div", { class: "metric" }, [
        el("div", { class: "label", text: pair[0] }),
        el("div", { class: "value", text: String(pair[1]) }),
      ]));
    });
    return grid;
  }

  function renderActive() {
    var sec = el("section", { class: "section" });
    sec.appendChild(el("h2", { text: "Active right now" }));
    if (!P.active.length) {
      sec.appendChild(el("div", { class: "empty-state", text: "Nothing in progress." }));
      return sec;
    }
    var list = el("div", { class: "active-list" });
    P.active.forEach(function (t) {
      list.appendChild(el("article", {
        class: "active-card",
        onclick: function () { openTicket(t.id); },
      }, [
        el("div", { class: "id", text: t.id }),
        el("div", { class: "title", text: t.title }),
        el("div", { class: "meta", text:
          (t.last_event ? "Last: " + t.last_event.date + " — " + t.last_event.text : "No events yet")
          + (t.breadcrumb ? " · " + t.breadcrumb : "")
        }),
      ]));
    });
    sec.appendChild(list);
    return sec;
  }

  function renderFilters() {
    var row = el("div", { class: "filter-row" });
    // status chips
    var allChip = el("button", {
      class: "chip" + (ACTIVE_FACETS.status === null ? " active" : ""),
      text: "All statuses",
      onclick: function () { ACTIVE_FACETS.status = null; applyKanbanFilters(row); },
    });
    row.appendChild(allChip);
    STATUSES.forEach(function (s) {
      row.appendChild(el("button", {
        class: "chip" + (ACTIVE_FACETS.status === s ? " active" : ""),
        text: STATUS_LABEL[s],
        onclick: function () { ACTIVE_FACETS.status = s; applyKanbanFilters(row); },
      }));
    });
    // epic chips — only render if more than one top-epic
    if (P.epics.length > 1) {
      row.appendChild(el("span", { class: "chip", style: "background:transparent;border:none;cursor:default;color:#8A93A6", text: "epic:" }));
      row.appendChild(el("button", {
        class: "chip" + (ACTIVE_FACETS.epic === null ? " active" : ""),
        text: "all",
        onclick: function () { ACTIVE_FACETS.epic = null; applyKanbanFilters(row); },
      }));
      P.epics.forEach(function (e) {
        row.appendChild(el("button", {
          class: "chip" + (ACTIVE_FACETS.epic === e.id ? " active" : ""),
          text: e.id,
          title: e.title,
          onclick: function () { ACTIVE_FACETS.epic = e.id; applyKanbanFilters(row); },
        }));
      });
    }
    // archived toggle
    row.appendChild(el("button", {
      class: "chip" + (ACTIVE_FACETS.showArchived ? " active" : ""),
      text: ACTIVE_FACETS.showArchived ? "Hide archived" : "Show archived",
      onclick: function () {
        ACTIVE_FACETS.showArchived = !ACTIVE_FACETS.showArchived;
        applyKanbanFilters(row);
      },
    }));
    return row;
  }

  function applyKanbanFilters(filterRow) {
    // Re-render filter row to reflect chip state.
    var newRow = renderFilters();
    filterRow.parentNode.replaceChild(newRow, filterRow);
    // Hide / show cards.
    var cards = document.querySelectorAll(".kanban-card[data-status]");
    cards.forEach(function (card) {
      var visible = true;
      if (ACTIVE_FACETS.status && card.dataset.status !== ACTIVE_FACETS.status) visible = false;
      if (ACTIVE_FACETS.epic && card.dataset.epic !== ACTIVE_FACETS.epic) visible = false;
      if (visible) card.classList.remove("hidden");
      else card.classList.add("hidden");
      if (card.dataset.archived === "true") {
        if (ACTIVE_FACETS.showArchived) card.classList.add("show-archived");
        else card.classList.remove("show-archived");
      }
    });
    // Update column counts.
    document.querySelectorAll(".kanban-col").forEach(function (col) {
      var v = col.querySelectorAll(".kanban-card:not(.hidden)").length;
      var hidden = col.querySelectorAll(".kanban-card.hidden").length;
      void hidden;
      var cEl = col.querySelector(".kanban-col-head .count");
      if (cEl) cEl.textContent = v;
    });
  }

  function buildKanbanCard(t, isArchived) {
    var card = el("article", {
      class: "kanban-card",
      data: { status: t.status, epic: t.epic_id, archived: isArchived ? "true" : "false" },
      onclick: function () { openTicket(t.id); },
    }, [
      el("div", { class: "kanban-card-top" }, [
        el("span", { class: "kanban-card-id", text: t.id }),
        el("span", { class: "kanban-card-kind", text: t.kind }),
      ]),
      el("div", { class: "kanban-card-title", text: t.title }),
      t.breadcrumb ? el("div", { class: "kanban-card-breadcrumb", text: t.breadcrumb }) : null,
      el("div", { class: "kanban-card-bottom" }, [
        t.children.length ? el("span", { text: t.children.length + " children" }) : null,
        t.events.length ? el("span", { text: t.events.length + " events" }) : null,
        (t.kind === "story" || t.kind === "task") && !(t.docs_meta || {}).plan
          ? el("span", { style: "color:#D97706;", text: "needs plan" })
          : null,
      ]),
    ]);
    return card;
  }

  function renderKanban() {
    var sec = el("section", { class: "section" });
    sec.appendChild(el("h2", { text: "Kanban" }));
    var filters = renderFilters();
    sec.appendChild(filters);
    var board = el("div", { class: "kanban" });
    STATUSES.forEach(function (s) {
      var col = el("div", { class: "kanban-col", data: { status: s } });
      var cards = el("div", { class: "kanban-cards" });
      var active = P.tickets.filter(function (t) { return t.status === s; });
      var arch = P.archived.filter(function (t) { return t.status === s; });
      active.forEach(function (t) { cards.appendChild(buildKanbanCard(t, false)); });
      arch.forEach(function (t) { cards.appendChild(buildKanbanCard(t, true)); });
      col.appendChild(el("div", { class: "kanban-col-head" }, [
        el("span", { text: STATUS_LABEL[s] }),
        el("span", { class: "count", text: String(active.length) }),
      ]));
      col.appendChild(cards);
      board.appendChild(col);
    });
    sec.appendChild(board);
    return sec;
  }

  function buildTreeRow(t) {
    var row = el("div", {
      class: "tree-row",
      onclick: function () { openTicket(t.id); },
    }, [
      el("span", { class: "id", text: t.id }),
      el("span", { class: "title", text: t.title }),
      el("span", { class: "status-pill", data: { status: t.status }, text: t.status }),
    ]);
    return row;
  }

  function walkChildren(parentId, container) {
    var kids = P.tickets.filter(function (t) { return t.parent === parentId; });
    kids.sort(function (a, b) { return a.id < b.id ? -1 : 1; });
    kids.forEach(function (t) {
      container.appendChild(buildTreeRow(t));
      walkChildren(t.id, container);
    });
  }

  function renderEpicTree() {
    var sec = el("section", { class: "section" });
    sec.appendChild(el("h2", { text: "Tree" }));
    var wrap = el("div", { class: "epic-tree" });
    if (!P.epics.length) {
      wrap.appendChild(el("div", { class: "empty-state", text: "No top-level epics." }));
      sec.appendChild(wrap);
      return sec;
    }
    P.epics.forEach(function (e) {
      var det = el("details", { class: "epic" });
      var summary = el("summary", {}, [
        el("span", { class: "epic-title", text: e.id + " · " + e.title }),
        el("span", { class: "status-pill", data: { status: e.status }, text: e.status }),
        el("div", { class: "epic-progress" }, [ el("div", { style: "width:" + e.progress + "%;" }) ]),
        el("span", { class: "epic-progress-label", text: e.progress + "%" }),
      ]);
      summary.addEventListener("click", function (ev) {
        // Allow opening the epic ticket on title click? — keep default toggle.
      });
      det.appendChild(summary);
      var children = el("div", { class: "epic-children" });
      walkChildren(e.id, children);
      det.appendChild(children);
      wrap.appendChild(det);
    });
    sec.appendChild(wrap);
    return sec;
  }

  function renderDiagrams() {
    var frag = document.createDocumentFragment();
    function block(label, source) {
      if (!source) return null;
      var det = el("details", { class: "diagram-card" });
      det.appendChild(el("summary", { text: label }));
      var mount = el("div", { class: "diagram-mount" });
      det.appendChild(mount);
      det.addEventListener("toggle", function () {
        if (!det.open || mount.dataset.rendered === "1") return;
        renderMermaid(mount, source, label.toLowerCase().replace(/\s+/g, "-"));
        mount.dataset.rendered = "1";
      });
      return det;
    }
    var sec = el("section", { class: "section" });
    sec.appendChild(el("h2", { text: "Diagrams" }));
    var wt = block("Work tree", P.work_tree_mermaid);
    if (wt) sec.appendChild(wt);
    var bb = block("Blocked-by graph", P.blocked_by_mermaid);
    if (bb) sec.appendChild(bb);
    if (!wt && !bb) {
      sec.appendChild(el("div", { class: "empty-state", text: "No diagrams to show." }));
    }
    frag.appendChild(sec);
    return frag;
  }

  function renderMermaid(mount, source, idPrefix) {
    function go() {
      try {
        if (!window.mermaid) {
          mount.textContent = "Mermaid not available.";
          return;
        }
        window.mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });
        var id = "mm-" + idPrefix + "-" + Math.random().toString(36).slice(2, 8);
        window.mermaid.render(id, source).then(function (res) {
          mount.innerHTML = res.svg;
        }).catch(function (err) {
          mount.innerHTML = "<pre>" + String(err) + "</pre>";
        });
      } catch (e) {
        mount.textContent = String(e);
      }
    }
    if (window.mermaid) go();
    else {
      // Wait for mermaid to load (defer + CDN)
      var tries = 0;
      var t = setInterval(function () {
        if (window.mermaid || tries++ > 80) { clearInterval(t); go(); }
      }, 100);
    }
  }

  function renderArchive() {
    var sec = el("section", { class: "section" });
    var det = el("details", { class: "archive-section" });
    det.appendChild(el("summary", { text: "Archive (" + P.archived.length + ")" }));
    var list = el("div", { class: "archive-list" });
    P.archived.forEach(function (t) {
      list.appendChild(el("div", {
        class: "archive-row",
        onclick: function () { openTicket(t.id); },
      }, [
        el("span", { class: "id", text: t.id }),
        el("span", { class: "title", text: t.title }),
        el("span", { class: "when", text: t.archived_at ? fmtDate(t.archived_at) : "" }),
        el("span", { class: "status-pill", data: { status: t.status }, text: t.status }),
      ]));
    });
    det.appendChild(list);
    sec.appendChild(det);
    return sec;
  }

  function renderFooter() {
    return el("footer", { class: "footer" }, [
      el("div", { text:
        "Generated " + (P.generated_at || "") + " · " +
        P.archived.length + " archived tickets"
      }),
      el("div", { html:
        'See <a href="https://github.com/HarryTgerman/deflation/blob/main/docs/ROADMAP_WORKFLOW.md" target="_blank" rel="noopener">ROADMAP_WORKFLOW.md</a> for usage.'
      }),
    ]);
  }

  // ── Modals ─────────────────────────────────────────────────────────

  function pushModal(node) {
    var z = 10000 + MODAL_STACK.length * 10;
    node.style.zIndex = z;
    document.body.appendChild(node);
    MODAL_STACK.push(node);
  }
  function popModal() {
    var n = MODAL_STACK.pop();
    if (n && n.parentNode) n.parentNode.removeChild(n);
  }
  function popAllModals() {
    while (MODAL_STACK.length) popModal();
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && MODAL_STACK.length) {
      popModal();
    }
  });

  function buildModal(headChildren, bodyNode) {
    var back = el("div", { class: "modal-backdrop", onclick: function (e) {
      if (e.target === back) popModal();
    }});
    var modal = el("div", { class: "modal" });
    var head = el("div", { class: "modal-head" }, headChildren.concat([
      el("button", { text: "×", onclick: popModal }),
    ]));
    modal.appendChild(head);
    var body = el("div", { class: "modal-body" });
    body.appendChild(bodyNode);
    modal.appendChild(body);
    back.appendChild(modal);
    return back;
  }

  function openTicket(id) {
    var t = TICKETS_BY_ID[id];
    if (!t) return;
    var docs = P.docs[id] || {};
    var docMeta = t.docs_meta || {};
    var bodyHtml = renderMarkdown(t.body || "");
    var body = el("div");
    body.appendChild(el("div", { html: bodyHtml }));
    // doc buttons
    var docBtns = el("div", { class: "modal-doc-buttons" });
    Object.keys(docMeta).forEach(function (key) {
      var d = docs[key];
      docBtns.appendChild(el("button", {
        class: "doc-btn",
        text: key.toUpperCase(),
        onclick: function () { openDoc(id, key); },
      }));
      void d;
    });
    if ((t.kind === "story" || t.kind === "task") && !docMeta.plan) {
      docBtns.appendChild(el("span", { class: "doc-btn doc-btn-empty", text: "+ PLAN" }));
    }
    if (docBtns.children.length) body.appendChild(docBtns);
    // events
    if (t.events.length) {
      var ev = el("div", { class: "modal-events" }, [
        el("h4", { text: "Events" }),
        el("ul", {}, t.events.map(function (e) {
          return el("li", { text: e.date + " — " + e.text });
        })),
      ]);
      body.appendChild(ev);
    }
    // breadcrumb / metadata
    var meta = el("div", { style: "color:#5B6478;font-size:0.78rem;margin-top:0.8rem;" }, [
      t.breadcrumb ? el("div", { text: "Path: " + t.breadcrumb }) : null,
      t.blocked_by.length ? el("div", { text: "Blocked by: " + t.blocked_by.join(", ") }) : null,
      t.surfaced_by ? el("div", { text: "Surfaced by: " + t.surfaced_by }) : null,
      t.archived ? el("div", { text: "Archived: " + fmtDate(t.archived_at) }) : null,
    ]);
    body.appendChild(meta);
    pushModal(buildModal([
      el("span", { class: "id", text: t.id }),
      el("span", { class: "title", text: t.title }),
      el("span", { class: "status-pill", data: { status: t.status }, text: t.status }),
    ], body));
  }

  function openDoc(ticketId, docKey) {
    var d = (P.docs[ticketId] || {})[docKey];
    var meta = (TICKETS_BY_ID[ticketId].docs_meta || {})[docKey];
    var body = el("div");
    if (d && d.available && d.content) {
      body.appendChild(el("div", { html: renderMarkdown(d.content) }));
      body.appendChild(el("div", {
        style: "margin-top:1rem;color:#5B6478;font-size:0.78rem;",
        text: "Source: " + (d.source || "")
      }));
      if (meta) {
        body.appendChild(el("div", { html:
          'Open on GitHub: <a href="' + meta + '" target="_blank" rel="noopener">' + meta + '</a>'
        }));
      }
    } else {
      body.appendChild(el("div", { html:
        "Doc unavailable locally. " +
        (meta ? 'Open on GitHub: <a href="' + meta + '" target="_blank" rel="noopener">' + meta + '</a>' : "")
      }));
    }
    pushModal(buildModal([
      el("span", { class: "id", text: ticketId }),
      el("span", { class: "title", text: docKey.toUpperCase() }),
    ], body));
  }

  // ── Boot ───────────────────────────────────────────────────────────

  function hydrate() {
    P = window.cockpit.payload();
    if (!P || !P.tickets) {
      var app = document.getElementById("cockpit-app");
      app.innerHTML = '<div class="empty-state">Payload unavailable.</div>';
      return;
    }
    TICKETS_BY_ID = {};
    P.tickets.concat(P.archived).forEach(function (t) { TICKETS_BY_ID[t.id] = t; });

    var app = document.getElementById("cockpit-app");
    app.innerHTML = "";
    var shell = el("div", { class: "app-shell" });
    shell.appendChild(renderHero());
    if (!P.tickets.length && !P.archived.length) {
      shell.appendChild(el("div", { class: "empty-state", text: "roadmap is empty" }));
      app.appendChild(shell);
      return;
    }
    shell.appendChild(renderMetrics());
    shell.appendChild(renderActive());
    shell.appendChild(renderKanban());
    shell.appendChild(renderEpicTree());
    shell.appendChild(renderDiagrams());
    if (P.archived.length) shell.appendChild(renderArchive());
    shell.appendChild(renderFooter());
    app.appendChild(shell);
  }

  document.addEventListener("cockpit:ready", hydrate);
})();
</script>
</body>
</html>
